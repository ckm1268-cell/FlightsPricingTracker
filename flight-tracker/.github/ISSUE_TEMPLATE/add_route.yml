name: "✈️ Add a flight route to track"
description: Add a new route, with dates and a target price, to the tracker.
title: "Add route: "
labels: ["add-route"]
body:
  - type: input
    id: route_name
    attributes:
      label: Route name
      description: Any label you want, just for your own reference
      placeholder: "New York to Tokyo"
    validations:
      required: true

  - type: input
    id: origin
    attributes:
      label: Departure city (IATA code)
      description: 3-letter airport or city code
      placeholder: "NYC"
    validations:
      required: true

  - type: input
    id: destination
    attributes:
      label: Destination city (IATA code)
      description: 3-letter airport or city code
      placeholder: "TYO"
    validations:
      required: true

  - type: input
    id: departure_date
    attributes:
      label: Departure date
      description: Format YYYY-MM-DD
      placeholder: "2026-09-10"
    validations:
      required: true

  - type: input
    id: return_date
    attributes:
      label: Return date (leave blank for one-way)
      description: Format YYYY-MM-DD
      placeholder: "2026-09-20"
    validations:
      required: false

  - type: input
    id: target_price
    attributes:
      label: Target price
      description: You'll be alerted when the price drops to this or lower
      placeholder: "650"
    validations:
      required: true

  - type: input
    id: currency
    attributes:
      label: Currency
      placeholder: "usd"
      value: "usd"
    validations:
      required: true
