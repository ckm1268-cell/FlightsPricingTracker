name: Flight Price Check

on:
  schedule:
    # Runs every 6 hours (UTC). Adjust as you like - cron syntax: min hour day month weekday
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit history.json back to the repo

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price tracker
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python track_prices.py

      - name: Commit updated history
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update flight price history [skip ci]"
          file_pattern: history.json
